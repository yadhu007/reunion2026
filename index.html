<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Reunion Portal</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #111827; /* Matches the dark portal background */
    }
    .iframe-container {
      position: absolute;
      top: -30px; /* This pushes the Google banner off the top of the screen */
      left: 0;
      width: 100%;
      height: calc(100% + 50px); /* Adds back the 50px we cut off */
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <iframe src="https://script.google.com/macros/s/AKfycbyeiysiVWD2eseNA03wxFj0z1TuWRmODNUDzhD_Mel5XrtXR2K7G0v1y2G2xoc42oxB/exec"></iframe>
  </div>

</body>
</html>
